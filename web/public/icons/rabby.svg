<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="rabby-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8697FF"/>
      <stop offset="100%" stop-color="#7B6EF6"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#rabby-gradient)"/>
  <!-- Rabbit head shape -->
  <ellipse cx="16" cy="18" rx="9" ry="8" fill="white"/>
  <!-- Left ear -->
  <ellipse cx="11" cy="8" rx="3" ry="6" fill="white"/>
  <ellipse cx="11" cy="8" rx="1.5" ry="4" fill="#E8DBFF"/>
  <!-- Right ear -->
  <ellipse cx="21" cy="8" rx="3" ry="6" fill="white"/>
  <ellipse cx="21" cy="8" rx="1.5" ry="4" fill="#E8DBFF"/>
  <!-- Left eye -->
  <circle cx="12" cy="16" r="2.5" fill="#7B6EF6"/>
  <circle cx="12.5" cy="15.5" r="1" fill="white"/>
  <!-- Right eye -->
  <circle cx="20" cy="16" r="2.5" fill="#7B6EF6"/>
  <circle cx="20.5" cy="15.5" r="1" fill="white"/>
  <!-- Nose -->
  <ellipse cx="16" cy="20" rx="1.5" ry="1" fill="#FFB6C1"/>
  <!-- Cheeks -->
  <ellipse cx="10" cy="19" rx="2" ry="1.5" fill="#FFE4E8" opacity="0.6"/>
  <ellipse cx="22" cy="19" rx="2" ry="1.5" fill="#FFE4E8" opacity="0.6"/>
</svg>
