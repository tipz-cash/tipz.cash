<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background with subtle dark fill for visibility -->
  <rect width="128" height="128" rx="28" fill="#0a0a0a"/>

  <!-- Stylized Z mark with glow -->
  <g filter="url(#glow)">
    <!-- Z shape -->
    <path
      d="M28 30 L100 30 L100 42 L54 42 L100 86 L100 98 L28 98 L28 86 L74 86 L28 42 Z"
      fill="#F5A623"
    />
    <!-- Strike-through lines -->
    <rect x="24" y="55" width="80" height="6" rx="2" fill="#F5A623" />
    <rect x="24" y="67" width="80" height="6" rx="2" fill="#F5A623" />
  </g>

  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
